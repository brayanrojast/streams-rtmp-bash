user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 2048;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application live {
            live on;
            record off;

            # Al iniciar un publish (OBS o bs-proxy) lanza ffmpeg para
            # generar 720p(copy)/480p/360p + master.m3u8.
            # nginx mata el proceso solo cuando el publish termina.
            exec_push /usr/local/bin/bs-abr.sh $name;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80;
        server_name _;

        root /var/www/brayanstreams;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Token DESACTIVADO por el momento (sin validación de ?token=)
        location ~ ^/stream/([^/]+)/master\.m3u8$ {
            alias /tmp/hls_abr/$1/master.m3u8;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types { application/vnd.apple.mpegurl m3u8; }
        }

        # Sub-playlists y segmentos de cada calidad (720p/480p/360p).
        # No exigen token aparte: quien tiene la URL del master ya pasó
        # el control de acceso; esto evita que las rutas relativas del
        # m3u8 (que no heredan query strings) se rompan con 403.
        location ~ ^/stream/([^/]+)/(720p|480p|360p)/(.+)$ {
            alias /tmp/hls_abr/$1/$2/$3;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        location /proxy/ {
            if ($arg_token = "") {
                return 403;
            }
            resolver 8.8.8.8 valid=30s;
            set $upstream $arg_url;
            proxy_pass $upstream;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_set_header Referer "";
            proxy_set_header Origin "";
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;
        }

        # Backend bs-api: atiende los botones Iniciar/Detener del panel admin
        # (POST /api/stream/start, /api/stream/stop, GET /api/stream/status).
        # Corre como servicio systemd en 127.0.0.1:3001, solo accesible via este proxy.
        location /api/ {
            proxy_pass http://127.0.0.1:3001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
        }

        location /stats {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
    }

    server {
        listen 8080;
        location /stats {
            rtmp_stat all;
        }
    }
}
