<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Patio TV — En vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
<style>
  :root {
    --black:#0a0a0a;--coal:#141414;--ember:#04140a;
    --green:#16a34a;--green-dim:#0e6b32;
    --lime:#84cc16;--lime-l:#a3e635;
    --ash:#2a2a2a;--muted:#666;
    --text:#e8e2d8;--text-dim:#9a9490;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
  header{background:var(--coal);border-bottom:2px solid var(--green);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:.04em;text-transform:uppercase}
  .logo .b{color:var(--green)}.logo .s{color:var(--lime-l)}
  .live-badge{display:flex;align-items:center;gap:7px;background:var(--green);color:#fff;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:3px}
  .live-badge::before{content:'';width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .hero{background:linear-gradient(135deg,var(--ember) 0%,var(--black) 60%);border-bottom:1px solid var(--ash);padding:36px 24px 28px;text-align:center}
  .hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(2.2rem,6vw,3.8rem);text-transform:uppercase;letter-spacing:.02em;line-height:1}
  .hero-title em{font-style:normal;color:var(--green)}
  .hero-sub{margin-top:8px;color:var(--text-dim);font-size:.88rem}
  .countdown{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .cd-box{background:var(--coal);border:1px solid var(--ash);border-top:2px solid var(--green);border-radius:6px;padding:10px 16px;min-width:68px;text-align:center}
  .cd-num{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;color:var(--green);font-variant-numeric:tabular-nums;line-height:1}
  .cd-label{display:block;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-top:5px}
  .cd-sep{align-self:center;color:var(--ash);font-size:1.4rem;font-weight:900}
  .countdown-caption{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--lime-l);margin-top:18px;margin-bottom:2px}
  .streams-section{padding:28px 20px 48px;max-width:1400px;margin:0 auto}
  .section-label{font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--lime-l);margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--ash)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,540px),1fr));gap:18px}
  .card{background:var(--coal);border:1px solid var(--ash);border-radius:6px;overflow:hidden;transition:border-color .2s}
  .card:hover{border-color:var(--green-dim)}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--ash);background:#111}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}
  .card-title span{color:var(--lime-l);margin-right:5px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--ash);transition:background .3s}
  .status-dot.live{background:var(--green);animation:pulse 1.4s infinite}
  .video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#050505}
  .video-wrap video{width:100%;height:100%;object-fit:contain;display:block}
  .overlay-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#050505}
  .overlay-idle .icon{width:44px;height:44px;border:1.5px solid var(--ash);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .overlay-idle p{font-size:.75rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .card-footer{padding:9px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--ash)}
  .viewers{font-size:.75rem;color:var(--text-dim)}
  .viewers strong{color:var(--lime-l)}
  footer{border-top:1px solid var(--ash);padding:18px 24px;text-align:center;color:var(--text-dim);font-size:.75rem;letter-spacing:.05em}
  footer strong{color:var(--green)}
  @media(max-width:600px){.hero{padding:24px 14px 20px}.streams-section{padding:18px 10px 32px}}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="b">Radio Patio</span> <span class="s">TV</span></div>
  <div class="live-badge">En vivo</div>
</header>
<div class="hero">
  <h1 class="hero-title">Radio Patio <em>TV</em></h1>
  <p class="hero-sub">Parchate que Fary renunciará jajaja 😂</p>
  <div class="countdown-caption">Fary renuncia en</div>
  <div class="countdown" id="countdown">
    <div class="cd-box"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Días</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Horas</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Min</span></div>
    <div class="cd-box"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Seg</span></div>
  </div>
</div>
<section class="streams-section">
  <div class="section-label">Canchas activas</div>
  <div class="grid" id="grid"></div>
</section>
<footer><strong>Radio Patio TV</strong> &mdash; Todos los derechos reservados</footer>
<script>
// Token desactivado por el momento
const SERVER = window.location.hostname === 'localhost' ? 'http://TU_IP' : '';

const canchas = [
  { id:1, nombre:'Cancha 1' },
  { id:2, nombre:'Cancha 2' },
  { id:3, nombre:'Cancha 3' },
  { id:4, nombre:'Cancha 4' },
];

const hlsInstances = {};

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  canchas.forEach(c => {
    const url = `${SERVER}/stream/cancha${c.id}/master.m3u8`;
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${c.id}`;
    div.innerHTML = `
      <div class="card-header">
        <div class="card-title"><span>#${c.id}</span>${c.nombre}</div>
        <div class="status-dot" id="dot-${c.id}"></div>
      </div>
      <div class="video-wrap">
        <video id="video-${c.id}" controls playsinline></video>
        <div class="overlay-idle" id="idle-${c.id}">
          <div class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <p>Sin señal</p>
        </div>
      </div>
      <div class="card-footer">
        <span class="viewers" id="viewers-${c.id}">Conectando...</span>
      </div>
    `;
    grid.appendChild(div);
    initPlayer(c.id, url);
  });
}

function initPlayer(id, url) {
  const video = document.getElementById(`video-${id}`);
  const idle = document.getElementById(`idle-${id}`);
  const dot = document.getElementById(`dot-${id}`);
  const viewers = document.getElementById(`viewers-${id}`);

  function onLive() {
    idle.style.display = 'none';
    video.style.display = 'block';
    dot.classList.add('live');
    viewers.innerHTML = '<strong>En vivo</strong>';
  }
  function onOffline() {
    idle.style.display = 'flex';
    video.style.display = 'none';
    dot.classList.remove('live');
    viewers.textContent = 'Sin señal';
  }

  if (Hls.isSupported()) {
    const hls = new Hls({ lowLatencyMode: true, manifestLoadingMaxRetry: 999, manifestLoadingRetryDelay: 3000 });
    hlsInstances[id] = hls;
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { onLive(); video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) onOffline(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => { onLive(); video.play().catch(()=>{}); });
    video.addEventListener('error', onOffline);
  } else {
    onOffline();
  }
}

buildGrid();

// ── CONTADOR: 30 de este mes a las 12:00 am ───────────────
function updateCountdown() {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), 30, 0, 0, 0);
  let diff = target - now;
  if (diff < 0) diff = 0;
  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);
  document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(s).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
